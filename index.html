<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Blue Skies Weather</title>
    <link rel="preconnect" href="https://api.open-meteo.com">
    <link rel="preconnect" href="https://geocoding-api.open-meteo.com">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app-shell">
      <section class="hero" aria-label="Current weather search">
        <div class="sky-art" aria-hidden="true">
          <div class="storm-glow"></div>
          <div class="cloud cloud-large"></div>
          <div class="cloud cloud-small"></div>
          <svg class="lightning-bolt" viewBox="0 0 220 360" aria-hidden="true">
            <defs>
              <filter id="bolt-glow" x="-70%" y="-70%" width="240%" height="240%">
                <feGaussianBlur stdDeviation="9" result="blur"></feGaussianBlur>
                <feColorMatrix
                  in="blur"
                  type="matrix"
                  values="1 0 0 0 1
                          0 1 0 0 0.86
                          0 0 1 0 0.36
                          0 0 0 0.95 0"
                  result="goldBlur"
                ></feColorMatrix>
                <feMerge>
                  <feMergeNode in="goldBlur"></feMergeNode>
                  <feMergeNode in="SourceGraphic"></feMergeNode>
                </feMerge>
              </filter>
            </defs>
            <path class="bolt-halo" d="M132 10 93 96 123 102 76 228 135 135 106 128 153 31"></path>
            <path class="bolt-halo bolt-branch" d="M112 126 58 164 97 155"></path>
            <path class="bolt-halo bolt-branch" d="M104 160 139 179 119 174"></path>
            <path class="bolt-main" d="M132 10 93 96 123 102 76 228 135 135 106 128 153 31"></path>
            <path class="bolt-main bolt-branch" d="M112 126 58 164 97 155"></path>
            <path class="bolt-main bolt-branch" d="M104 160 139 179 119 174"></path>
            <path class="bolt-core" d="M132 10 93 96 123 102 76 228 135 135 106 128 153 31"></path>
          </svg>
          <div class="rain rain-back"></div>
          <div class="rain rain-front"></div>
        </div>

        <div class="weather-panel">
          <div class="brand-row">
            <div>
              <p class="eyebrow">Public API forecast</p>
              <h1>Blue Skies Weather</h1>
            </div>
            <span class="status-pill" id="status-pill">Ready</span>
          </div>

          <form class="search-form" id="search-form">
            <label for="location-input">Location</label>
            <div class="search-row">
              <input
                id="location-input"
                name="location"
                type="search"
                autocomplete="address-level2"
                placeholder="Search city or place"
                value="New York"
                required
              >
              <button type="submit">Search</button>
            </div>
          </form>

          <section class="current-card" id="current-card" aria-live="polite">
            <div>
              <p class="location" id="location-name">New York, United States</p>
              <p class="condition" id="condition">Loading forecast...</p>
            </div>
            <div class="temp-wrap">
              <span class="temp" id="temperature">--</span>
              <span class="unit">°F</span>
            </div>
          </section>

          <section class="metrics" aria-label="Current conditions">
            <article>
              <span>Feels like</span>
              <strong id="feels-like">--</strong>
            </article>
            <article>
              <span>Wind</span>
              <strong id="wind">--</strong>
            </article>
            <article>
              <span>Humidity</span>
              <strong id="humidity">--</strong>
            </article>
          </section>
        </div>
      </section>

      <section class="forecast-section" aria-label="Seven day forecast">
        <div class="section-heading">
          <h2>7 day forecast</h2>
          <p id="updated-at">Updated when a location loads.</p>
        </div>
        <div class="forecast-grid" id="forecast-grid"></div>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
